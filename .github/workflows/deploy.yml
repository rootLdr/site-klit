name: Deploy to GitHub Pages

# Publica o site a cada push na branch principal.
# Também pode ser disparado manualmente pela aba "Actions" do GitHub.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissões mínimas para o deploy do GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy por vez (não cancela um deploy em andamento).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (astro build => dist/)
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
